# flashbay GitLab CI/CD Template
#
# Include in your .gitlab-ci.yml:
#   include:
#     - remote: 'https://raw.githubusercontent.com/flashbay-dev/fbay-integrations/main/templates/gitlab-ci.yml'
#
# Then extend the template in your job:
#   hil-test:
#     extends: .flashbay-hil
#     variables:
#       FLASHBAY_BOARD: esp32-s3
#       FLASHBAY_FIRMWARE: build/firmware.bin
#     script:
#       - pytest tests/hil/ -v

.flashbay-install:
  before_script:
    - |
      OS=$(uname -s | tr '[:upper:]' '[:lower:]')
      ARCH=$(uname -m)
      case "$ARCH" in
        x86_64)  ARCH="amd64" ;;
        aarch64) ARCH="arm64" ;;
        armv7l)  ARCH="armv7" ;;
      esac
      TAG=$(curl -s https://api.github.com/repos/flashbay-dev/fbay-cli/releases/latest | jq -r .tag_name)
      curl -sL "https://github.com/flashbay-dev/fbay-cli/releases/download/${TAG}/fbay-${OS}-${ARCH}" -o /usr/local/bin/fbay
      chmod +x /usr/local/bin/fbay
      fbay version

# Full HIL workflow: create session, flash, run user script, end session.
# Override `script:` with your test commands.
.flashbay-hil:
  extends: .flashbay-install
  variables:
    FLASHBAY_BOARD: ""
    FLASHBAY_FIRMWARE: ""
    FLASHBAY_SERIAL_TIMEOUT: "30s"
  script:
    - fbay serial --timeout "$FLASHBAY_SERIAL_TIMEOUT" --log serial-output.txt
    - cat serial-output.txt
  after_script:
    - fbay session end || true
  artifacts:
    when: always
    paths:
      - serial-output.txt

# Flash-only: create session, flash firmware, end session.
.flashbay-flash:
  extends: .flashbay-install
  variables:
    FLASHBAY_BOARD: ""
    FLASHBAY_FIRMWARE: ""
  script:
    - fbay session create --board "$FLASHBAY_BOARD"
    - fbay flash "$FLASHBAY_FIRMWARE"
    - fbay session end
  after_script:
    - fbay session end || true
