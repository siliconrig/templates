# siliconrig GitLab CI/CD Template
#
# Include in your .gitlab-ci.yml:
#   include:
#     - remote: 'https://raw.githubusercontent.com/siliconrig/srig-integrations/main/templates/gitlab-ci.yml'
#
# Then extend the template in your job:
#   hil-test:
#     extends: .siliconrig-hil
#     variables:
#       SRIG_BOARD: esp32-s3
#       SRIG_FIRMWARE: build/firmware.bin
#     script:
#       - pytest tests/hil/ -v

.siliconrig-install:
  before_script:
    - |
      OS=$(uname -s | tr '[:upper:]' '[:lower:]')
      ARCH=$(uname -m)
      case "$ARCH" in
        x86_64)  ARCH="amd64" ;;
        aarch64) ARCH="arm64" ;;
        armv7l)  ARCH="armv7" ;;
      esac
      TAG=$(curl -s https://api.github.com/repos/siliconrig/srig-cli/releases/latest | jq -r .tag_name)
      curl -sL "https://github.com/siliconrig/srig-cli/releases/download/${TAG}/srig-${OS}-${ARCH}" -o /usr/local/bin/srig
      chmod +x /usr/local/bin/srig
      srig version

# Full HIL workflow: create session, flash, run user script, end session.
# Override `script:` with your test commands.
.siliconrig-hil:
  extends: .siliconrig-install
  variables:
    SRIG_BOARD: ""
    SRIG_FIRMWARE: ""
    SRIG_SERIAL_TIMEOUT: "30s"
  script:
    - srig serial --timeout "$SRIG_SERIAL_TIMEOUT" --log serial-output.txt
    - cat serial-output.txt
  after_script:
    - srig session end || true
  artifacts:
    when: always
    paths:
      - serial-output.txt

# Flash-only: create session, flash firmware, end session.
.siliconrig-flash:
  extends: .siliconrig-install
  variables:
    SRIG_BOARD: ""
    SRIG_FIRMWARE: ""
  script:
    - srig session create --board "$SRIG_BOARD"
    - srig flash "$SRIG_FIRMWARE"
    - srig session end
  after_script:
    - srig session end || true
